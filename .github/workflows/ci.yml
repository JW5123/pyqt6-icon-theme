name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install Ruff
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check pyqt6_icon_theme/

      - name: Install virtual display and OpenGL libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            xvfb \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3

      - name: Run tests
        run: xvfb-run -a poetry run pytest tests/ -v --cov=pyqt6_icon_theme --cov-report=term-missing